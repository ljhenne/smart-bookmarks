<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bookmarks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
  >
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card" role="main">
    <div class="tabs-nav" role="tablist" aria-label="Extension Tabs">
      <button
        class="tab-btn active"
        data-tab="save-tab"
        role="tab"
        aria-selected="true"
        aria-controls="save-tab"
      >
        Save
      </button>
      <button
        class="tab-btn"
        data-tab="search-tab"
        role="tab"
        aria-selected="false"
        aria-controls="search-tab"
      >
        Search
      </button>
    </div>

    <!-- Tab 1: Save -->
    <div
      class="tab-content active"
      id="save-tab"
      role="tabpanel"
      aria-labelledby="save-tab"
    >
      <div class="save-container">
        <h2 class="tab-title">Save Bookmark</h2>
        <p class="tab-subtitle">Store this page semantically in your library</p>

        <!-- Premium preview card -->
        <div class="preview-card" aria-live="polite">
          <div class="preview-details">
            <span class="preview-title" id="preview-title">Loading page title...</span>
            <span class="preview-url" id="preview-url">loading url...</span>
          </div>
        </div>

        <div
          id="save-error-message"
          class="save-error-msg hidden"
          aria-live="assertive"
          role="alert"
        ></div>

        <button
          id="save-page-btn"
          class="btn btn-save-action"
          aria-label="Save current page as a bookmark"
        >
          <span class="btn-text">Save Bookmark</span>
          <span
            id="save-btn-spinner"
            class="btn-spinner hidden"
            aria-hidden="true"
          ></span>
        </button>

        <div
          id="maggie-success-nest"
          class="maggie-success-nest hidden"
          aria-live="polite"
        >
          <img
            src="maggie_perched.png"
            alt="Maggie"
            class="maggie-success-img"
            aria-hidden="true"
          >
          <span class="maggie-bubble">Saved to my nest!</span>
        </div>
      </div>
    </div>

    <!-- Tab 2: Search -->
    <div
      class="tab-content"
      id="search-tab"
      role="tabpanel"
      aria-labelledby="search-tab"
    >
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="Search saved bookmarks..."
          autocomplete="off"
          aria-label="Search query"
        >
        <button
          id="search-btn"
          class="search-submit-btn"
          aria-label="Submit search"
        >
          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
      <div
        id="search-results"
        class="search-results-list"
        aria-live="polite"
      >
        <div class="search-empty-state">
          <p>Type a question or keywords to search your bookmarks semantically</p>
        </div>
      </div>
    </div>

  </div>
  
  <script type="module" src="dist/popup.js"></script>
</body>
</html>
